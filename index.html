<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙輪平衡機器人 - 主動水平平台模擬</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { margin: 0 0 10px 0; color: #00d2d3; }
        .header p { margin: 0; color: #a9a9a9; font-size: 0.95rem; }
        .panel {
            background-color: #2b2b36;
            padding: 20px;
            border-radius: 8px;
            width: 800px;
            box-sizing: border-box;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }
        label { font-weight: bold; font-size: 0.9rem; }
        input[type=range] { flex-grow: 1; cursor: pointer; max-width: 300px; }
        .value-display { font-size: 1.1rem; font-weight: bold; color: #4da8da; width: 50px; text-align: right; }
        
        /* 切換開關 UI */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e1e24;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #00d2d3; }
        input:checked + .slider:before { transform: translateX(26px); }

        .canvas-container { display: flex; flex-direction: column; gap: 15px; width: 800px; }
        canvas {
            background-color: #2b2b36;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 100%;
        }
        .legend {
            display: flex; justify-content: center; gap: 20px; margin-top: -5px; font-size: 0.9rem;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 12px; height: 12px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>主動雲台補償 (Active Gimbal) 模擬</h1>
        <p>觀察底盤為了加速而傾斜時，伺服馬達如何進行逆向補償以維持上方載具絕對水平。</p>
    </div>

    <div class="panel">
        <div class="control-group">
            <label style="color: #4da8da;">遙控目標速度:</label>
            <input type="range" id="speedSlider" min="-80" max="80" value="0">
            <div class="value-display" id="speedValue">0</div>
        </div>
        
        <div class="toggle-container">
            <label style="color: #f5f5f5;">主動水平補償</label>
            <label class="switch">
                <input type="checkbox" id="stabilizeCheck" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="simCanvas" width="800" height="320"></canvas>
        
        <div class="legend">
            <div class="legend-item"><div class="color-box" style="background: #ff9ff3;"></div> 底盤傾角 (Pitch)</div>
            <div class="legend-item"><div class="color-box" style="background: #feca57;"></div> 伺服馬達作動角 (相對於底盤)</div>
            <div class="legend-item"><div class="color-box" style="background: #00d2d3;"></div> 平台絕對水平角 (對齊地面)</div>
        </div>
        <canvas id="chartCanvas" width="800" height="200"></canvas>
    </div>

    <script>
        const simCanvas = document.getElementById('simCanvas');
        const simCtx = simCanvas.getContext('2d');
        const chartCanvas = document.getElementById('chartCanvas');
        const chartCtx = chartCanvas.getContext('2d');
        
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const stabilizeCheck = document.getElementById('stabilizeCheck');

        // 系統變數
        let x = 400;             
        let v = 0;               
        let theta = 0;           // 底盤傾角
        let omega = 0;           
        let target_v = 0;        
        let speed_integral = 0;
        let target_theta = 0;

        // 歷史資料
        const historyLength = 400;
        const history = {
            base_pitch: new Array(historyLength).fill(0),
            servo_angle: new Array(historyLength).fill(0),
            platform_absolute: new Array(historyLength).fill(0)
        };

        speedSlider.addEventListener('input', (e) => {
            target_v = parseFloat(e.target.value);
            speedValue.textContent = target_v.toFixed(0);
        });

        function updatePhysics() {
            const dt = 0.02; 
            const isStabilized = stabilizeCheck.checked;

            // 1. 速度環 PI 控制
            let speedError = target_v - v;
            speed_integral += speedError * dt;
            if(speed_integral > 200) speed_integral = 200;
            if(speed_integral < -200) speed_integral = -200;

            target_theta = (speedError * 0.005) + (speed_integral * 0.001);
            if(target_theta > 0.4) target_theta = 0.4;
            if(target_theta < -0.4) target_theta = -0.4;

            // 2. 直立環 PD 控制
            let thetaError = target_theta - theta;
            let motor_accel = (thetaError * 180) - (omega * 12); 
            
            let gravity_torque = theta * 30;
            omega += (gravity_torque + motor_accel) * dt;
            theta += omega * dt;

            v += (-motor_accel * 0.4) * dt;
            x += v * dt;

            if (x > 850) x = -50;
            if (x < -50) x = 850;

            // 3. 平台伺服馬達邏輯
            // 如果開啟補償，伺服馬達角度 = -底盤角度
            let servo_angle_rad = isStabilized ? -theta : 0;
            let platform_absolute_rad = theta + servo_angle_rad;

            // 記錄數據 (轉為度數)
            history.base_pitch.push(theta * 57.3); history.base_pitch.shift();
            history.servo_angle.push(servo_angle_rad * 57.3); history.servo_angle.shift();
            history.platform_absolute.push(platform_absolute_rad * 57.3); history.platform_absolute.shift();
        }

        function drawRobot() {
            simCtx.clearRect(0, 0, simCanvas.width, simCanvas.height);
            
            // 畫地面
            simCtx.beginPath();
            simCtx.moveTo(0, 260); simCtx.lineTo(800, 260);
            simCtx.strokeStyle = '#555'; simCtx.lineWidth = 4; simCtx.stroke();
            simCtx.strokeStyle = '#333'; simCtx.lineWidth = 2;
            for(let i = -100; i < 900; i+= 50) {
                let lineX = (i - x % 50);
                simCtx.beginPath(); simCtx.moveTo(lineX, 260); simCtx.lineTo(lineX, 270); simCtx.stroke();
            }

            simCtx.save();
            simCtx.translate(x, 240); // 輪軸中心

            // 畫輪子
            simCtx.beginPath(); simCtx.arc(0, 0, 20, 0, Math.PI * 2);
            simCtx.fillStyle = '#1e1e24'; simCtx.fill();
            simCtx.strokeStyle = '#a9a9a9'; simCtx.lineWidth = 4; simCtx.stroke();
            simCtx.save();
            simCtx.rotate(x * 0.05); 
            simCtx.beginPath(); simCtx.moveTo(0, 0); simCtx.lineTo(0, 20);
            simCtx.strokeStyle = '#4da8da'; simCtx.stroke();
            simCtx.restore();

            // 旋轉底盤
            simCtx.rotate(theta);
            
            // 底盤主體
            simCtx.fillStyle = '#4da8da';
            simCtx.fillRect(-15, -110, 30, 100);
            
            // 伺服馬達關節點
            simCtx.beginPath(); simCtx.arc(0, -110, 8, 0, Math.PI * 2);
            simCtx.fillStyle = '#fff'; simCtx.fill();

            // 根據是否開啟穩定，旋轉上方平台
            const isStabilized = stabilizeCheck.checked;
            simCtx.translate(0, -110);
            if (isStabilized) {
                // 逆向抵消底盤傾角
                simCtx.rotate(-theta);
            }

            // 畫出平台
            simCtx.fillStyle = '#00d2d3';
            simCtx.fillRect(-50, -10, 100, 10);
            
            // 平台上放一個水杯來展示水平狀態
            simCtx.fillStyle = '#e15f41';
            simCtx.fillRect(-15, -40, 30, 30);
            simCtx.fillStyle = '#f5f5f5';
            simCtx.fillRect(-15, -40, 30, 5);

            simCtx.restore();
        }

        function drawCharts() {
            chartCtx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);
            const w = chartCanvas.width; const h = chartCanvas.height;
            
            // 基準線
            chartCtx.strokeStyle = '#444'; chartCtx.lineWidth = 1; 
            chartCtx.beginPath();
            chartCtx.moveTo(0, h/2); chartCtx.lineTo(w, h/2); // 0 度線
            chartCtx.stroke();

            function drawLine(data, color, scale) {
                chartCtx.beginPath(); chartCtx.strokeStyle = color; chartCtx.lineWidth = 2.5;
                for(let i = 0; i < historyLength; i++) {
                    let px = (i / historyLength) * w;
                    let py = (h/2) - (data[i] * scale);
                    if(i === 0) chartCtx.moveTo(px, py);
                    else chartCtx.lineTo(px, py);
                }
                chartCtx.stroke();
            }

            // 繪製三條曲線
            drawLine(history.servo_angle, '#feca57', 3);       // 伺服馬達相對角
            drawLine(history.base_pitch, '#ff9ff3', 3);        // 底盤傾角
            drawLine(history.platform_absolute, '#00d2d3', 3); // 平台絕對角
        }

        function loop() {
            updatePhysics();
            drawRobot();
            drawCharts();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
